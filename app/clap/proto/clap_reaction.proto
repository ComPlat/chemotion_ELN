syntax = "proto3";

package clap;

/**
 * Reaction
 * The root level of a Reaction.
 **/
message Reaction {
  string clap_version = 1;
  string reaction_id = 2;
  ReactionProvenance provenance = 3;
  ReactionConditions conditions = 4;
  optional SampleSetup sample_setup = 5;
  repeated ReactionStep reaction_steps = 6;
}

/**
 * SampleSetup
 * We can create Reaction processes based on a Sample only, which are not
 * associated to an actual ELN-Reaction. The SampleSetup defines the initial
 * state of such a Process, i.e. which Sample it acts upon and notably the
 * initial VesselTemplate used.
 **/
message SampleSetup {
  Sample sample = 1;
  optional VesselTemplate vessel_template = 2;
}

message ReactionProvenance {
  Person experimenter = 1;
  string city = 2;
  DateTime experiment_start = 3;
  string doi = 4;
  string patent = 5;
  string publication_url = 6;
  RecordEvent record_created = 7;
  repeated RecordEvent record_modified = 8;
}

/**
 * Each ReactionStep describes an atomar reaction (in a vessel) and itself
 * consists of atomar ReactionProcessActions.
 **/
message ReactionStep {
  // Unique UUID for this reaction step.
  string reaction_step_id = 1;
  // The position of this step within the Reaction
  int32 position = 2;
  // The AutomationControl defines the status of this step for the automation in
  // the actual automated laboratory run.
  AutomationControl automation_control = 3;
  // The start_time (in seconds) in the total reaction.
  TimeSpan start_time = 4;
  // The total duration.
  TimeSpan duration = 5;
  // The automation mode of the Step, i.e. wether this Step runs manually,
  // semi-automated or automated.
  Ontology automation_mode = 6;
  // The VesselTemplate / Vessel this Step takes place in.
  optional VesselTemplate vessel_template = 7;
  // The individual ReactionProcessActions defining the ReactionStep.
  repeated ReactionProcessAction actions = 8;
}

message ReactionSetup { optional VesselTemplate vessel_template = 1; }

message ReactionConditions {
  TemperatureControl temperature_control = 1;
  PressureControl pressure_control = 2;
  MotionControl motion_control = 3;
  IrradiationControl irradiation_control = 4;
  PhAdjustControl ph_control = 5;
  WavelengthRange wavelengths = 6;
  repeated GenericConditions generic = 7;
}

message ReactionConditionLimits {
  ReactionConditions conditions = 1;
  TimeSpan duration = 2;
}

/**
 * An individual Action defining the reaction workflow.
 * It is usually referenced within a ReactionStep.
 *
 */
message ReactionProcessAction {
  string id = 1;
  string description = 2;
  int32 position = 3;
  optional AutomationControl automation_control = 4;
  // automationOrdinal is a unique numbering assigned for uniqe identification
  // in the communication with the automation lab. It is relevant in case of multiple runs (e.g.
  // due to halting Actions with manual resolving) where the ReactionProcess can
  // be edited further, so automationControl-status, position etc. might change so the automation lab can
  // identify and keep track of the actions it already knows.
  int32 automation_ordinal = 5;
  TimeSpan start_time = 6;
  TimeSpan duration = 7;
  repeated Equipment equipment = 8;
  optional VesselTemplate vessel_template = 9;
  // The fraction (usually created manually from a Chromatography response) processed by this Action.
  optional PoolingFraction consumed_fraction = 10;

  optional Ontology type = 11;
  optional Ontology subtype = 12;
  optional Ontology device = 13;
  optional string method = 14;

  oneof action {
    // A special form of Action defining an alteration of the environment
    // conditions of the Reaction Process.
    ReactionConditions conditions = 100;
    ActionAdd addition = 101;
    ActionEvaporation evaporation = 102;
    ActionGasExchange gas_exchange = 103;
    ActionFiltration filtration = 104;
    ActionChromatography chromatography = 105;
    ActionExtraction extraction = 106;
    ActionCrystallization crystallization = 107;
    ActionCentrifugation centrifugation = 108;
    ActionChromatography analysis_chromatography = 109;
    ActionAnalysisSpectroscopy analysis_spectroscopy = 110;
    ActionAnalysisElemental analysis_elemental = 111;
    ActionTransfer transfer = 112;
    ActionWait wait = 113;
    ActionSaveSample save_sample = 114;
    ActionDiscard discard = 115;
    ActionDefineFraction define_fraction = 116;
    ActionMixing mixing = 117;
  }

  message ActionAdd {
    enum AdditionSpeedType {
      UNSPECIFIED = 0;
      ALL_AT_ONCE = 1;
      FAST = 2;
      SLOW = 3;
      DROPWISE = 4;
      CONTINUOUS = 5;
      PORTIONWISE = 6;
      FLOW_RATE = 7;
    }
    Sample sample = 1;
    AdditionSpeedType addition_speed_type = 2;
    FlowRate flow_rate = 3;
    ReactionConditions addition_conditions = 4;
  }

  message ActionGasExchange { repeated SolventWithRatio gas_type = 1; }

  message ActionMixing { Motion speed = 1; }

  message ActionTransfer {
    Sample sample = 1;
    string source_reaction_step_id = 2;
    string target_reaction_step_id = 3;
    Amount amount = 4;
    Percentage percentage = 5;
  }

  message ActionEvaporation {
    message FromDiverseSolvents {
      repeated SolventWithRatio solvents = 1;
      Amount solvents_amount = 2;
    }
    message FromReaction {
      repeated Sample samples = 1;
      Amount amount = 2;
      repeated SolventWithRatio solvents = 3;
      Amount solvents_amount = 4;
    }
    message FromMethod {
      ReactionConditions starter_conditions = 1;
      repeated ReactionConditionLimits limits = 2;
    }
    message FromFraction { repeated PoolingFraction fraction = 1; }

    oneof origin {
      FromReaction from_reaction = 1;
      FromReaction from_reaction_step = 2;
      FromReaction from_sample = 3;
      FromMethod from_method = 4;
      FromMethod stepwise = 5;
      FromFraction from_fraction = 6;
      FromDiverseSolvents diverse_solvents = 7;
    }
  }

  message ActionCrystallization {
    enum CrystallizationMode {
      UNSPECIFIED = 0;
      NONE = 1;
      COLD = 2;
      HOT = 3;
    }

    repeated SolventWithRatio solvents = 1;
    Amount amount = 2;
    Temperature temperature = 3;
    TimeSpan heating_duration = 4;
    TimeSpan cooling_duration = 5;
    CrystallizationMode crystallization_mode = 6;
  }

  message ActionCentrifugation {
    Temperature temperature = 1;
    Motion speed = 2;
    Pressure pressure = 3;
  }

  message ActionChromatography {
    message ChromatographyStep {
      enum Step {
        STEP_UNSPECIFIED = 0;
        EQUILIBRIUM = 1;
        SEPARATION = 2;
        AFTER_RUN = 3;
      }
      enum Prod {
        PROD_UNSPECIFIED = 0;
        ANY = 1;
        PROD = 2;
        NONE = 3;
      }

      TimeSpan duration = 1;
      repeated SolventWithRatio solvents = 2;
      Amount amount = 3;
      FlowRate flow_rate = 4;
      Step step = 5;
      Prod prod = 6;
    }

    repeated Detector detectors = 1;
    repeated Ontology mobile_phase = 2;
    optional string method = 3;
    string stationary_phase = 4;
    TemperatureControl stationary_phase_temperature = 5;
    Volume inject_volume = 6;

    optional Ontology material = 7;
    optional Length diameter = 8;
    optional Length height = 9;
    optional Length filling_height = 10;

    repeated ChromatographyStep steps = 11;
    repeated PoolingFraction fractions = 12;

    repeated Sample molecular_entities = 13;
    repeated Sample samples = 14;
  }

  message ActionExtraction {
    message ExtractionStep {
      TimeSpan duration = 1;
      repeated SolventWithRatio solvents = 2;
      Amount amount = 3;
      FlowRate flow_rate = 4;
    }
    enum ExtractionPhase {
      UNSPECIFIED = 0;
      AQUEOUS = 1;
      ORGANIC = 2;
    }

    ExtractionPhase phase = 2;
    repeated ExtractionStep steps = 3;
  }

  message ActionFiltration {
    enum FiltrationMode {
      UNSPECIFIED = 0;
      KEEP_SUPERNATANT = 1;
      KEEP_PRECIPITATE = 2;
    }
    message FiltrationStep {
      TimeSpan duration = 1;
      repeated SolventWithRatio solvents = 2;
      Amount amount = 3;
      FlowRate flow_rate = 4;
      int32 repetitions = 5;
      bool rinse_vessel = 6;
    }
    FiltrationMode filtration_mode = 1;
    repeated FiltrationStep steps = 2;
  }

  message ActionAnalysisElemental {
    repeated Sample molecular_entities = 3;
    repeated Sample samples = 4;
    repeated Ontology detectors = 5;
  }

  message ActionAnalysisSpectroscopy {
    repeated Sample molecular_entities = 3;
    repeated Sample samples = 4;
    repeated SolventWithRatio solvents = 5;
  }

  message ActionDiscard { PoolingFraction fraction = 1; }
  message ActionDefineFraction { PoolingFraction fraction = 1; }
  message ActionWait { TimeSpan duration = 1; }

  message ActionSaveSample {
    enum OriginType {
      UNSPECIFIED = 0;
      ALL = 1;
      SPLIT = 2;
      PURIFICATION = 3;
    }

    message PurificationOrigin {
      string origin_action_id = 1;
      int32 origin_purification_step_position = 2;
      repeated Sample solvents = 3;
      Amount amount = 4;
      repeated Sample extra_solvents = 5;
    }

    Sample sample = 1;
    repeated Sample molecular_entities = 2;
    OriginType sample_origin_type = 3;
    optional PurificationOrigin purification_origin = 4;
  }
}

message Detector {
  Ontology ontology = 1;
  ReactionConditions conditions = 2;
}

/**
 * An Ontology is a reference to a CHMO (chemical methods ontology) or a
 * genericly defined ontology. It can contain any concept, i.e. Substances /
 * Samples, Solvents, Materials, Automation_modes, Devices, Detectors, ... Most
 * Ontologies stand for themselves, except Samples have their Ontology data as a
 * piggybacked attribute.
 **/
message Ontology {
  string id = 1;
  string label = 2;
  string name = 3;
}

/**
 * A Sample is a Substance used in the Reaction either by adding, saving,
 * transfering, etc.
 *
 **/
message Sample {
  ReactionRole.ReactionRoleType reaction_role = 1;
  string label = 2;
  string name = 3;
  // Samples may be defined through an Ontology which we then reference here.
  Ontology ontology = 4;
  // The preparations for this Sample before the actual Reaction process.
  repeated SamplePreparation preparations = 5;
  Amount amount = 6;
  optional Percentage percentage = 7;
  Percentage purity = 8;
  // Optional flag when adding solvents.
  optional bool is_waterfree_solvent = 9;

  // The location where the Sample is stored in the laboratory.
  string location = 10;
}

/**
 * Samples may undergo additional preparation before being used in a
 * reaction after being received from a supplier or vendor.
 */
message SamplePreparation {
  enum PreparationType {
    UNDEFINED = 0;
    SYNTHESIZED = 1;
    DISSOLVED = 2;
    HOMOGENIZED = 3;
    TEMPERATURE_ADJUSTED = 4;
    DEGASSED = 5;
    DRIED = 6;
  }
  repeated PreparationType type = 1;
  string details = 2;
  repeated Equipment equipment = 3;
}

/**
 * Definition of a Solvent with its ratio in a mixture (Array) of Solvents.
 */
message SolventWithRatio {
  Sample solvent = 1;
  string ratio = 2;
}

/**
 * A pooling fraction contains the pooling of vials after samples were drafted
 * in the automation process during specific Actions, mostly Chromatography. The
 * pooling is usually done manually from the reported intermediate results of
 * the automation.
 */
message PoolingFraction {
  // The ReactionProcessAction that delivered the intermediate results
  string parent_action_id = 1;
  // The position (order) of this fraction within all fractions created from the
  // Parent Activity.
  int32 position = 2;
  // The ReactionProcessAction where the PoolingFraction is processed further
  // ("consumed").
  string consuming_action_id = 3;
  // The Array of vials (by id) making up this PoolingFraction.
  repeated string vials = 4;
}


/**
 * AutomationControl defines the automation status of the ReactionProcess and
 * the ReactionProcessAction. For convenience they are combined into a single
 * message. Actions and Steps carry this status to control the actual automation
 * run.
 */
message AutomationControl {
  enum AutomationStatus {
    AUTOMATION_STATUS_UNSPECIFIED = 0;
    CAN_RUN = 1;
    HALT = 2;
    AUTOMATION_RESPONDED = 3;
    HALT_RESOLVED_NEEDS_CONFIRMATION = 4;
    HALT_RESOLVED = 5;
    DEPENDS_ON_ACTION = 6;
    DEPENDS_ON_STEP = 7;
    COMPLETED = 8;
  }

  enum StepAutomationStatus {
    STEP_AUTOMATION_STATUS_UNSPECIFIED = 0;
    STEP_CAN_RUN = 1;
    STEP_DEPENDS_ON_PRECEDING = 2;
    STEP_MANUAL_PROCEED = 3;
    STEP_COMPLETED = 4;
  }

  oneof automation_status {
    AutomationStatus status = 1;
    StepAutomationStatus step_status = 2;
  }
  optional string depends_on_action_id = 3;
  optional string depends_on_step_id = 4;
}

/**
 * The Reaction Roles a substance can take.
 */

message ReactionRole {
  enum ReactionRoleType {
    UNSPECIFIED = 0;
    SOLVENT = 1;
    DIVERSE_SOLVENT = 2;
    SAMPLE = 3;
    ADDITIVE = 4;
    MEDIUM = 5;
    CRUDE = 6;
    INTERMEDIATE = 7;
    MIXTURE = 8;
    PURE = 9;
  }
}

/**
 * The Equipment that can be applied to several ReactionProcessActions etc.
 */

message Equipment {
  enum EquipmentType {
    UNSPECIFIED = 0;
    CUSTOM = 1;
    NONE = 2;
    SYRINGE = 3;
    CANNULA = 4;
    ADDITION_FUNNEL = 5;
    SPATULA = 6;
    PIPE = 7;
    PIPET = 8;
    FLASK = 9;
    DOSING_STATION = 10;
    LIQUID_HANDLING_SYSTEM = 11;
    SYRINGE_AND_SYRINGE_PUMP = 12;
    HEATING_MANTLE = 13;
    BLOW_DRYER = 14;
    OIL_BATH = 15;
    ICE_BATH = 16;
    ALUMINIUM_BLOCK = 17;
    WATER_BATH = 18;
    SAND_BATH = 19;
    REACTOR = 20;
    ULTRA_SOUND_BATH = 21;
    UV_LAMP = 22;
    LED = 23;
    STIRRER = 24;
    SHAKER = 25;
    HEATING_SHAKER = 26;
    TUBE = 27;
    BALL_MILLING = 28;
    PUMP = 29;
    COIL = 30;
    FILTER = 31;
    SEPARATION_FUNNEL = 32;
    EXTRACTOR = 33;
    SPE_COLUMN = 34;
    FSPE_COLUMN = 35;
    FLASH_COLUMN = 36;
    DISTILLATION_APPARATUS = 37;
    DROPPING_FUNNEL = 38;
    BUCHNER_FUNNEL = 39;
    MICROWAVE_REACTOR = 40;
    FUNNEL = 41;
    WATER_COOLER = 42;
    SEPARATION_FILTER = 43;
  }
  EquipmentType type = 1;
}

/**
 * The VesselTemplate defines the primary container within which the
 * reaction was performed, including the type of vessel, its primary material,
 * any preparation steps or vessel attachments, and its volume.
 *
 * It defines the characteristics of a Vessel, not the Vessel itself.
 * If a specific Vessel is used it can be set in Vessel.
 * This is a bit unusual due to the VesselTemplate schema in the ELN, which
 * requires us to always specify the VesselTemplate used and allows but not
 * requires a specific vessel.
 */
message VesselTemplate {
  message Vessel {
    string id = 1;
    string label = 2;
    string description = 3;
    string bar_code = 4;
    string qr_code = 5;
    Mass weight = 6;
  }
  enum VesselType {
    UNSPECIFIED = 0;
    CUSTOM = 1;
    ROUND_BOTTOM_FLASK = 2;
    VIAL = 3;
    WELL_PLATE = 4;
    MICROWAVE_VIAL = 5;
    TUBE = 6;
    CONTINUOUS_STIRRED_TANK_REACTOR = 7;
    PACKED_BED_REACTOR = 8;
    NMR_TUBE = 9;
    PRESSURE_FLASK = 10;
    PRESSURE_REACTOR = 11;
    ELECTROCHEMICAL_CELL = 12;
    SCHLENK_FLASK = 13;
    SCHLENK_TUBE = 14;
    MULTINECK_FLASK = 15;
    COIL = 16;
    CUVETTE = 17;
    BEAKER = 18;
    ERLENMEYER_FLASK = 19;
  }

  string id = 1;
  string name = 2;

  string details = 3;

  VesselType type = 4;
  string material = 5;
  Volume volume = 6;
  repeated VesselPreparation preparations = 7;
  repeated VesselAttachment attachments = 8;

  // Filled if a specific vessel is in use (as opposed to a vesselTemplate
  // defined only by its characteristics)
  optional VesselTemplate.Vessel vessel = 9;

  VesselCleanup cleanup = 10;
}

message VesselAttachment {
  enum VesselAttachmentType {
    UNSPECIFIED = 0;
    NONE = 1;
    CUSTOM = 2;
    SEPTUM = 3;
    CAP = 4;
    MAT = 5;
    REFLUX_CONDENSER = 6;
    VENT_NEEDLE = 7;
    DEAN_STARK = 8;
    VACUUM_TUBE = 9;
    ADDITION_FUNNEL = 10;
    DRYING_TUBE = 11;
    ALUMINUM_FOIL = 12;
    THERMOCOUPLE = 13;
    BALLOON = 14;
    GAS_ADAPTER = 15;
    PRESSURE_REGULATOR = 16;
    RELEASE_VALVE = 17;
    STIRRING_BAR = 18;
    CANNULA = 19;
    FINDENSER = 20;
    PRESSURE_CAPS_VIALS = 21;
    TUBE = 22;
    STOPPER = 23;
    METAL_REFLUX_CONDENSER = 24;
    SOXHLET_EXTRACTOR = 25;
    OVERHEAD_STIRRER = 26;
    FUNNEL = 27;
    DROPPING_FUNNEL = 28;
    SEPARATION_FUNNEL = 29;
    HYDRATION_APPARATUS = 30;
  }
  VesselAttachmentType type = 1;
}

message VesselPreparation {
  enum VesselPreparationType {
    UNSPECIFIED = 0;
    CUSTOM = 1;
    NONE = 2;
    OVEN_DRIED = 3;
    FLAME_DRIED = 4;
    EVACUATED_BACKFILLED = 5;
    PURGED = 6;
  }
  VesselPreparationType type = 1;
}

/**
 *  What to do with vessel after the automated process run.
 */

message VesselCleanup {
  enum VesselCleanupType {
    UNSPECIFIED = 0;
    WASTE = 1;
    REMOVE = 2;
    STORAGE = 3;
  }
  VesselCleanupType type = 1;
}

message Material {
  enum MaterialType {
    UNSPECIFIED = 0;
    CUSTOM = 1;
    GLASS = 2;
    POLYPROPYLENE = 3;
    PLASTIC = 4;
    METAL = 5;
    QUARTZ = 6;
    BROWN_GLASS = 7;
    PFA = 8;
    PTFE = 9;
    BOROSILICATE_GLASS = 10;
    POLYMETHLYPENTENE = 11;
    POLYETHYLENE = 12;
  }
  MaterialType type = 1;
  string details = 2;
}

/**
 * The amount of a Substance
 */
message Amount {
  oneof kind {
    Mass mass = 1;
    Moles moles = 2;
    Volume volume = 3;
    Percentage percentage = 4;
  }
}

message GenericConditions {
  string name = 1;
  string conditions = 2;
}

message PhAdjustControl {
  enum PhAdjustMeasurementType {
    UNSPECIFIED = 0;
    PH_ELECTRODE = 1;
    PH_STRIPE = 2;
    OTHER = 3;
  }

  double ph = 1;
  PhAdjustMeasurementType measurement_type = 2;
}

message TemperatureControl {
  enum TemperatureControlType {
    UNSPECIFIED = 0;
    CUSTOM = 1;
    AMBIENT = 2;
    OIL_BATH = 3;
    WATER_BATH = 4;
    SAND_BATH = 5;
    ICE_BATH = 6;
    DRY_ALUMINUM_PLATE = 7;
    MICROWAVE = 8;
    DRY_ICE_BATH = 9;
    AIR_FAN = 10;
    LIQUID_NITROGEN = 11;
    MEASUREMENT_IN_REACTION = 12;
    CONTACT_MEDIUM = 13;
  }
  Temperature temperature = 1;
  TemperatureControlType temperature_control_type = 2;
}

message PressureControl { Pressure pressure = 1; }

message MotionControl {
  enum MotionControlType {
    UNSPECIFIED = 0;
    CUSTOM = 1;
    NONE = 2;
    STIR_BAR = 3;
    OVERHEAD_MIXER = 4;
    AGITATION = 5;
    BALL_MILLING = 6;
    SONICATION = 7;
    OTHER = 8;
  }

  MotionControlType type = 1;
  Motion speed = 2;

  Ontology motion_mode = 3;
}

message IrradiationControl {
  enum IrradiationType {
    UNSPECIFIED = 0;
    CUSTOM = 1;
    AMBIENT = 2;
    DARK = 3;
    LED = 4;
    HALOGEN_LAMP = 5;
    DEUTERIUM_LAMP = 6;
    SOLAR_SIMULATOR = 7;
    BROAD_SPECTRUM = 8;
    LAMP = 9;
    LASER = 10;
    MICROWAVE_REACTOR = 11;
  }
  IrradiationType type = 1;
  Wavelength peak_wavelength = 3;
  Power power = 6;
  optional bool power_is_ramp = 7;
  optional Power power_end = 8;
}

/**
 * General Definitions
 */
message Person {
  string username = 1;
  string name = 2;
  string orcid = 3;
  string organization = 4;
  string email = 5;
}

message RecordEvent {
  DateTime time = 1;
  Person person = 2;
  string details = 3;
}

/**
 * Definition of metrics and units.
 * Aligned to the OpenReactionDatabase (ORD) scheme even when unused in ELN.
 */
message DateTime { string value = 1; }

message TimeSpan {
  enum TimeUnit {
    UNSPECIFIED = 0;
    SECOND = 1;
    MINUTE = 2;
    HOUR = 3;
    DAY = 4;
  }
  optional float value = 1;
  TimeUnit unit = 2;
}
message Mass {
  enum MassUnit {
    UNSPECIFIED = 0;
    KILOGRAM = 1;
    GRAM = 2;
    MILLIGRAM = 3;
    MICROGRAM = 4;
  }
  optional double value = 1;
  optional double precision = 2;
  MassUnit unit = 3;
}
message Moles {
  enum MolesUnit {
    UNSPECIFIED = 0;
    MOLE = 1;
    MILLIMOLE = 2;
    MICROMOLE = 3;
    NANOMOLE = 4;
  }
  optional double value = 1;
  optional double precision = 2;
  MolesUnit unit = 3;
}
message Volume {
  enum VolumeUnit {
    UNSPECIFIED = 0;
    LITER = 1;
    MILLILITER = 2;
    MICROLITER = 3;
    NANOLITER = 4;
  }
  optional double value = 1;
  optional double precision = 2;
  VolumeUnit unit = 3;
}
message Concentration {
  enum ConcentrationUnit {
    UNSPECIFIED = 0;
    MOLAR = 1;
    MILLIMOLAR = 2;
    MICROMOLAR = 3;
  }
  optional double value = 1;
  optional double precision = 2;
  ConcentrationUnit unit = 3;
}
message Percentage {
  optional double value = 1;
  optional double precision = 2;
}
message Pressure {
  enum PressureUnit {
    UNSPECIFIED = 0;
    BAR = 1;
    ATMOSPHERE = 2;
    PSI = 3;
    KPSI = 4;
    PASCAL = 5;
    KILOPASCAL = 6;
    TORR = 7;
    MM_HG = 8;
    MBAR = 9;
  }
  optional double value = 1;
  optional double precision = 2;
  PressureUnit unit = 3;
}
message Temperature {
  enum TemperatureUnit {
    UNSPECIFIED = 0;
    CELSIUS = 1;
    FAHRENHEIT = 2;
    KELVIN = 3;
  }
  optional double value = 1;
  optional double precision = 2;
  TemperatureUnit unit = 3;
}
message Current {
  enum CurrentUnit {
    UNSPECIFIED = 0;
    AMPERE = 1;
    MILLIAMPERE = 2;
  }
  optional double value = 1;
  optional double precision = 2;
  CurrentUnit unit = 3;
}

message Motion {
  enum MotionUnit {
    UNSPECIFIED = 0;
    RPM = 1;
  }
  optional double value = 1;
  optional double precision = 2;
  MotionUnit unit = 3;
}

message Power {
  enum PowerUnit {
    UNSPECIFIED = 0;
    WATT = 1;
    MILLIWATT = 2;
  }
  optional double value = 1;
  optional double precision = 2;
  PowerUnit unit = 3;
}

message Voltage {
  enum VoltageUnit {
    UNSPECIFIED = 0;
    VOLT = 1;
    MILLIVOLT = 2;
  }
  optional double value = 1;
  optional double precision = 2;
  VoltageUnit unit = 3;
}
message Length {
  enum LengthUnit {
    UNSPECIFIED = 0;
    CENTIMETER = 1;
    MILLIMETER = 2;
    METER = 3;
    INCH = 4;
    FOOT = 5;
  }
  optional double value = 1;
  optional double precision = 2;
  LengthUnit unit = 3;
}
message WavelengthRange {
  repeated Wavelength peaks = 1;
  bool is_range = 2;
}
message Wavelength {
  enum WavelengthUnit {
    UNSPECIFIED = 0;
    NANOMETER = 1;
    WAVENUMBER = 2; // cm^{-1}
  }
  optional double value = 1;
  optional double precision = 2;
  WavelengthUnit unit = 3;
}
message FlowRate {
  enum FlowRateUnit {
    UNSPECIFIED = 0;
    MICROLITER_PER_MINUTE = 1;
    MICROLITER_PER_SECOND = 2;
    MILLILITER_PER_MINUTE = 3;
    MILLILITER_PER_SECOND = 4;
    MICROLITER_PER_HOUR = 5;
  }
  optional double value = 1;
  optional double precision = 2;
  FlowRateUnit unit = 3;
}
